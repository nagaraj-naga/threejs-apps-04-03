<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three.js Interactive Scene</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
    canvas { display: block; }
    #info {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      background: rgba(0,0,0,0.5);
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 14px;
      pointer-events: none;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.1);
    }
    #stats {
      position: absolute;
      bottom: 16px;
      left: 16px;
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="info">🖱️ Drag to orbit · Scroll to zoom · Click objects to interact</div>
  <div id="stats"></div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';

    // --- Scene Setup ---
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x0a0a2e, 0.035);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(5, 4, 8);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.body.appendChild(renderer.domElement);

    // --- OrbitControls (inline minimal implementation) ---
    class SimpleOrbitControls {
      constructor(camera, domElement) {
        this.camera = camera;
        this.domElement = domElement;
        this.target = new THREE.Vector3();
        this.spherical = new THREE.Spherical();
        this.sphericalDelta = new THREE.Spherical();
        this.scale = 1;
        this.rotateSpeed = 0.8;
        this.zoomSpeed = 1.2;
        this.minDistance = 2;
        this.maxDistance = 30;
        this.isDown = false;
        this.prev = { x: 0, y: 0 };
        this.enableDamping = true;
        this.dampingFactor = 0.08;

        const offset = new THREE.Vector3();
        offset.copy(camera.position).sub(this.target);
        this.spherical.setFromVector3(offset);

        domElement.addEventListener('pointerdown', (e) => { this.isDown = true; this.prev = { x: e.clientX, y: e.clientY }; });
        domElement.addEventListener('pointermove', (e) => {
          if (!this.isDown) return;
          const dx = e.clientX - this.prev.x;
          const dy = e.clientY - this.prev.y;
          this.sphericalDelta.theta -= (2 * Math.PI * dx / domElement.clientHeight) * this.rotateSpeed;
          this.sphericalDelta.phi -= (2 * Math.PI * dy / domElement.clientHeight) * this.rotateSpeed;
          this.prev = { x: e.clientX, y: e.clientY };
        });
        domElement.addEventListener('pointerup', () => { this.isDown = false; });
        domElement.addEventListener('wheel', (e) => {
          if (e.deltaY > 0) this.scale *= (1 / 0.95);
          else this.scale *= 0.95;
          e.preventDefault();
        }, { passive: false });
      }
      update() {
        const offset = new THREE.Vector3();
        offset.copy(this.camera.position).sub(this.target);
        this.spherical.setFromVector3(offset);
        if (this.enableDamping) {
          this.spherical.theta += this.sphericalDelta.theta * this.dampingFactor;
          this.spherical.phi += this.sphericalDelta.phi * this.dampingFactor;
        } else {
          this.spherical.theta += this.sphericalDelta.theta;
          this.spherical.phi += this.sphericalDelta.phi;
        }
        this.spherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, this.spherical.phi));
        this.spherical.radius *= this.scale;
        this.spherical.radius = Math.max(this.minDistance, Math.min(this.maxDistance, this.spherical.radius));
        this.scale = 1;
        offset.setFromSpherical(this.spherical);
        this.camera.position.copy(this.target).add(offset);
        this.camera.lookAt(this.target);
        if (this.enableDamping) {
          this.sphericalDelta.theta *= (1 - this.dampingFactor);
          this.sphericalDelta.phi *= (1 - this.dampingFactor);
        } else {
          this.sphericalDelta.set(0, 0, 0);
        }
      }
    }

    const controls = new SimpleOrbitControls(camera, renderer.domElement);

    // --- Lighting ---
    const ambientLight = new THREE.AmbientLight(0x404080, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffeedd, 1.2);
    dirLight.position.set(5, 8, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 50;
    dirLight.shadow.camera.left = -10;
    dirLight.shadow.camera.right = 10;
    dirLight.shadow.camera.top = 10;
    dirLight.shadow.camera.bottom = -10;
    scene.add(dirLight);

    const pointLight1 = new THREE.PointLight(0xff6b6b, 1.5, 15);
    pointLight1.position.set(-3, 3, -3);
    scene.add(pointLight1);

    const pointLight2 = new THREE.PointLight(0x4ecdc4, 1.5, 15);
    pointLight2.position.set(3, 2, 3);
    scene.add(pointLight2);

    // --- Ground Plane ---
    const groundGeo = new THREE.PlaneGeometry(40, 40);
    const groundMat = new THREE.MeshStandardMaterial({ color: 0x1a1a3e, roughness: 0.8, metalness: 0.2 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.5;
    ground.receiveShadow = true;
    scene.add(ground);

    // --- Grid ---
    const grid = new THREE.GridHelper(40, 40, 0x3a3a6e, 0x2a2a4e);
    grid.position.y = -0.49;
    scene.add(grid);

    // --- Interactive Objects ---
    const interactables = [];
    const originalColors = new Map();

    function createObject(geometry, color, position, name) {
      const mat = new THREE.MeshStandardMaterial({
        color, roughness: 0.3, metalness: 0.6,
        emissive: new THREE.Color(color).multiplyScalar(0.1)
      });
      const mesh = new THREE.Mesh(geometry, mat);
      mesh.position.copy(position);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      mesh.userData = { name, baseY: position.y, clicked: false };
      scene.add(mesh);
      interactables.push(mesh);
      originalColors.set(mesh, color);
      return mesh;
    }

    // Torus Knot
    createObject(
      new THREE.TorusKnotGeometry(0.7, 0.25, 100, 16),
      0xff6b6b, new THREE.Vector3(0, 1.5, 0), 'Torus Knot'
    );

    // Icosahedron
    createObject(
      new THREE.IcosahedronGeometry(0.8, 0),
      0x4ecdc4, new THREE.Vector3(-3, 1, -2), 'Icosahedron'
    );

    // Octahedron
    createObject(
      new THREE.OctahedronGeometry(0.8, 0),
      0xffe66d, new THREE.Vector3(3, 1, -1), 'Octahedron'
    );

    // Dodecahedron
    createObject(
      new THREE.DodecahedronGeometry(0.7, 0),
      0xa29bfe, new THREE.Vector3(-2, 1, 2.5), 'Dodecahedron'
    );

    // Torus
    createObject(
      new THREE.TorusGeometry(0.6, 0.25, 16, 50),
      0x55efc4, new THREE.Vector3(2.5, 1, 3), 'Torus'
    );

    // Cylinder
    createObject(
      new THREE.CylinderGeometry(0.4, 0.6, 1.5, 8),
      0xfd79a8, new THREE.Vector3(0, 0.75, -3.5), 'Cylinder'
    );

    // --- Raycaster for Click Interaction ---
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    renderer.domElement.addEventListener('click', (event) => {
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(interactables);
      if (intersects.length > 0) {
        const obj = intersects[0].object;
        obj.userData.clicked = !obj.userData.clicked;
        if (obj.userData.clicked) {
          obj.material.emissive.setHex(0xffffff);
          obj.material.emissiveIntensity = 0.5;
        } else {
          const col = originalColors.get(obj);
          obj.material.emissive.set(new THREE.Color(col).multiplyScalar(0.1));
          obj.material.emissiveIntensity = 1;
        }
      }
    });

    // --- Starfield Background ---
    const starGeo = new THREE.BufferGeometry();
    const starCount = 2000;
    const starPositions = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount * 3; i++) {
      starPositions[i] = (Math.random() - 0.5) * 100;
    }
    starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
    const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1, transparent: true, opacity: 0.8 });
    const stars = new THREE.Points(starGeo, starMat);
    scene.add(stars);

    // --- Animation Loop ---
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      // Rotate objects
      interactables.forEach((obj, i) => {
        obj.rotation.x += 0.005 + i * 0.002;
        obj.rotation.y += 0.008 + i * 0.001;
        // Floating animation
        obj.position.y = obj.userData.baseY + Math.sin(t * 1.5 + i * 1.2) * 0.2;
        // Scale pulse on clicked
        if (obj.userData.clicked) {
          const s = 1 + Math.sin(t * 4) * 0.1;
          obj.scale.set(s, s, s);
        } else {
          obj.scale.set(1, 1, 1);
        }
      });

      // Animate point lights
      pointLight1.position.x = Math.sin(t * 0.7) * 4;
      pointLight1.position.z = Math.cos(t * 0.7) * 4;
      pointLight2.position.x = Math.cos(t * 0.5) * 4;
      pointLight2.position.z = Math.sin(t * 0.5) * 4;

      // Rotate stars slowly
      stars.rotation.y += 0.0002;

      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    // --- Resize ---
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // --- Stats ---
    const statsEl = document.getElementById('stats');
    setInterval(() => {
      statsEl.textContent = `Objects: ${interactables.length} · Triangles: ${renderer.info.render.triangles}`;
    }, 500);
  </script>
</body>
</html>
